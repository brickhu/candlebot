<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candlebot Dashboard · K线专家</title>
    <link rel="stylesheet" href="../popup/index.css">
    <style>
        /* Dashboard 特有样式 */
        body {
            width: 100%;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        #root {
            width: 100%;
            min-height: 100vh;
        }

        /* 加载状态 */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 1.5rem;
        }

        .loading-spinner {
            width: 3rem;
            height: 3rem;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 错误状态 */
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
            gap: 1.5rem;
        }

        .error-icon {
            font-size: 3rem;
            color: var(--color-red);
        }

        .error-message {
            color: var(--color-red);
            font-size: 1rem;
            max-width: 400px;
        }

        .retry-button {
            padding: 0.75rem 1.5rem;
            background: var(--color-accent);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .retry-button:hover {
            background: var(--color-accent-dark);
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- 初始加载状态 -->
        <div class="loading-container">
            <div class="loading-spinner"></div>
            <div>加载 Candlebot Dashboard...</div>
        </div>
    </div>
    <script type="module" src="./index.jsx"></script>
</body>
</html>
